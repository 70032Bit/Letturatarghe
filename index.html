<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 15px; background-color: #f4f4f9; margin: 0; }
    #reader { width: 100%; max-width: 450px; margin: 15px auto; background: white; padding: 5px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; min-height: 250px; }
    #result { margin-top: 15px; font-size: 22px; font-weight: bold; padding: 16px; border-radius: 10px; transition: background-color 0.3s; color: #333; background-color: #eee; }
    .btn { margin: 8px; padding: 14px 28px; font-size: 17px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; color: white; }
    #btnRiavvia { background-color: #007bff; margin-top: 15px; display: none; }
    #btnCambiaModalita { background-color: #6c757d; margin-top: 10px; display: none; }

    #selezioneModalita { margin-top: 40px; }
    #btnParcheggio { background-color: #28a745; padding: 22px 40px; font-size: 20px; }
    #btnLavaggio { background-color: #fd7e14; padding: 22px 40px; font-size: 20px; }

    #modalitaAttuale { font-size: 16px; color: #555; margin-top: 10px; }

    .result-parcheggio { background-color: #28a745 !important; color: white !important; }
    .result-lavaggio { background-color: #fd7e14 !important; color: white !important; }
    .result-errore { background-color: #dc3545 !important; color: white !important; }
    .result-nontrovata { background-color: #ffc107 !important; color: #333 !important; }
  </style>
</head>
<body>
  <h2>Verifica Targhe da Chiave</h2>

  <div id="selezioneModalita">
    <p>Seleziona la modalità:</p>
    <button id="btnParcheggio" class="btn" onclick="selezionaModalita('Parcheggio')">🅿️ Parcheggio</button>
    <button id="btnLavaggio" class="btn" onclick="selezionaModalita('Lavaggio')">🧼 Lavaggio</button>
  </div>

  <div id="schermataScanner" style="display:none;">
    <div id="modalitaAttuale"></div>
    <div id="reader"></div>
